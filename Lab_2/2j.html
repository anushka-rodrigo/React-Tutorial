<!DOCTYPE html>
<html>
  <head>
    <title>Lab 2</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ProductDetails({ name, price, discountPrice, imageSrc }) {
            return (
                <div>
                    <img src={imageSrc} width="150" />
                    <p>{name}</p>
                    {discountPrice ? (
                        <> 
                            <p><del>Price: $ {price}</del></p>
                            <p>Discount price: $ {discountPrice}</p>
                        </>
                    ) : (
                        <p>Price: $ {price}</p>
                    )

                    }
                    <button>Add to Cart</button>
                </div>
            );
            //{discountPrice ? (true execute) : (false execute)}
        }

        function App() {
            return (
                <>
                    <ProductDetails 
                        imageSrc="../imgs/cotton-socks.png"
                        name="Cotton socks" 
                        price="10.90" 
                        discountPrice="5.45"
                    />
                    <ProductDetails 
                        imageSrc="../imgs/tennis-balls.png"
                        name="Tennis balls" 
                        price="6.00"
                    />
                    <ProductDetails 
                        imageSrc="../imgs/plain-t-shirt.png"
                        name="Plain T-Shirt" 
                        price="7.99"
                    />
                </>
            );
        }

      

      const container = document.querySelector('.js-container'); 
      ReactDOM.createRoot(container).render(<App />); 
    </script>
  </body>
</html>
